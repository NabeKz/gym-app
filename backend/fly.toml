# fly.io 設定。デプロイは `fly deploy -c backend/fly.toml` で行う。
app = "gym-app"
# Neon が aws-ap-southeast-1（シンガポール）なので fly も sin が近い
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
