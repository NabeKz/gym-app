[tools]
atlas = "latest"
bun = "latest"
dotenvx = "latest"
erlang = "28"
gleam = "latest"
rebar = "latest"
watchexec = "latest"
"github:superfly/flyctl" = "latest"

[env]
DATABASE_URL = "postgresql://postgres:dev@localhost:5432/gym_app"

[tasks.test]
description = "Run unit tests"
run = "gleam test 2>&1 | tee /tmp/test-output.txt"

[tasks.test-summary]
description = "Output test results as markdown (reads test-results/)"
run = "bun run scripts/test_summary.ts"

[tasks.gen]
description = "Generate Gleam types from openapi.yaml"
dir = "../scripts"
run = "bun run gen"

[tasks.docker-up]
hide = true
run = "docker compose up -d"

[tasks.db-migrate]
description = "Apply schema to local Docker DB"
depends = ["docker-up"]
run = """
atlas schema apply --env local --auto-approve
"""

[tasks.gen-sql]
description = "Generate type-safe Gleam functions from SQL files (requires local DB)"
depends = ["docker-up"]
run = """
  gleam run -m squirrel
"""

[tasks.dev]
description = "dev"
run = """
  watchexec -w src -r --stop-timeout 0 --stop-signal SIGKILL -- gleam run
"""

[tasks.deploy]
description = "Deploy backend to fly.io (erlang version is sourced from mise.toml)"
run = """
  flyctl deploy --build-arg ERLANG_VERSION=$(mise config get tools.erlang)
"""

[tasks.db-apply]
description = "Apply schema to database (declarative migration)"
usage = 'arg "<env>" default="local"'
run = 'atlas schema apply --env "$usage_env" --auto-approve'

[tasks.db-plan]
description = "Preview schema diff without applying"
usage = 'flag "--env <env>" default="local"'
run = 'atlas schema apply --env "$usage_env" --dry-run'

# Neon 向け。[env] のローカル DATABASE_URL をインラインで上書きし、terraform state
# から取得する。atlas 用 URL は endpoint オプション付き（lib/pq が SNI 非対応のため）。
# dev DB は本番とは別の Neon データベース(atlas_dev)を使う（docker 不要）。
[tasks.db-plan-neon]
description = "Preview schema diff against Neon DB"
run = """
  DATABASE_URL="$(mise -C ../terraform run atlas-url)" \
  DEV_DATABASE_URL="$(mise -C ../terraform run dev-database-url)" \
  atlas schema apply --env neon --dry-run
"""

[tasks.db-apply-neon]
description = "Apply schema to Neon DB"
run = """
  DATABASE_URL="$(mise -C ../terraform run atlas-url)" \
  DEV_DATABASE_URL="$(mise -C ../terraform run dev-database-url)" \
  atlas schema apply --env neon --auto-approve
"""

[tasks.db-seed]
description = "Insert seed data via usecase layer"
depends = ["db-migrate"]
run = """
  gleam run -m seed
"""

[tasks.gen-erd]
description = "Generate Mermaid ER diagram from schema.hcl"
run = """
  echo '```mermaid' > ../docs/erd.md
  atlas schema inspect \
    --env local \
    --format "{% raw %}{{ mermaid . }}{% endraw %}" \
    >> ../docs/erd.md
  echo '```' >> ../docs/erd.md
"""
