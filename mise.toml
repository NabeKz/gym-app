[tools]
atlas = "latest"
dotenvx = "latest"
jq = "latest"
pnpm = "latest"
watchexec = "latest"
node = "latest"
bun = "latest"

[tasks.dev-backend]
description = "dev-backend"
dir = "backend"
run = """
  mise run dev
"""

[tasks.dev-frontend]
description = "dev-frontend"
dir = "frontend"
run = """
  mise run dev
"""

[tasks.codegen]
description = "Generate code from openapi.yaml and SQL files"
run = """
  mise -C backend run gen
  mise -C frontend run gen
  mise -C backend run gen-sql
"""
