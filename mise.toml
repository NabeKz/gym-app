[tools]
dotenvx = "latest"
jq = "latest"
bun = "latest"

[tasks.dev-all]
description = "dev-all"
depends = ["dev-backend", "dev-frontend"]

[tasks.dev-backend]
description = "dev-backend"
dir = "backend"
run = """
  docker compose -f ../compose.yml up -d
  mise run dev
"""

[tasks.dev-frontend]
description = "dev-frontend"
dir = "frontend"
run = """
  mise run dev
"""

[tasks.codegen]
description = "Generate code from openapi.yaml and SQL files"
run = """
  mise -C backend run gen
  mise -C frontend run gen
  mise -C backend run gen-sql
"""

[tasks.db-connect]
description = "db connect"
run = """
  docker compose exec -e PGOPTIONS="-c search_path=app" db psql -U postgres -d gym_app
"""

[tasks.puml]
description = "puml"
run = """
  docker run -d -p 8080:8080 plantuml/plantuml-server:jetty
"""
