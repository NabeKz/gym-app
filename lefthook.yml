    gen-openapi:
      glob: "docs/openapi.yaml"
      run: mise run codegen && git add backend/src/generated/ frontend/src/shared/generated/

pre-push:
  commands:
    build:
      run: gleam build
      root: backend/
    test:
      run: gleam test
      root: backend/
