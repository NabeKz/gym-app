openapi: "3.1.0"
info:
  title: Gym App API
  version: "1.0.0"

paths:
  /lessons:
    get:
      summary: レッスン一覧取得
      operationId: getLessons
      parameters:
        - name: date
          in: query
          description: 指定日のレッスンに絞り込む (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: レッスン一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lesson"
    post:
      summary: レッスン作成
      operationId: createLesson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonInput"
      responses:
        "200":
          description: 作成したレッスン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

components:
  schemas:
    CreateLessonInput:
      type: object
      required:
        - name
        - instructor
        - startsAt
        - endsAt
        - capacity
      properties:
        name:
          type: string
        instructor:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        capacity:
          type: integer
        description:
          type: ["string", "null"]

    Lesson:
      type: object
      required:
        - id
        - name
        - instructor
        - startsAt
        - endsAt
        - capacity
        - remainingSlots
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        instructor:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        capacity:
          type: integer
        remainingSlots:
          type: integer
        description:
          type: ["string", "null"]

    Exercise:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
        muscleGroup:
          type: ["string", "null"]

    WorkoutSet:
      type: object
      required:
        - id
        - reps
      properties:
        id:
          type: integer
        reps:
          type: integer
        weightKg:
          type: ["number", "null"]

    WorkoutExercise:
      type: object
      required:
        - id
        - exercise
        - sets
      properties:
        id:
          type: integer
        exercise:
          $ref: "#/components/schemas/Exercise"
        sets:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSet"

    Workout:
      type: object
      required:
        - id
        - date
        - exercises
      properties:
        id:
          type: integer
        date:
          type: string
        notes:
          type: ["string", "null"]
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutExercise"
