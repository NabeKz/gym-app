[tools]
node = "latest"
pnpm = "latest"
wrangler = "latest"

[tasks.gen]
description = "Generate TypeScript client from openapi.yaml"
run = "pnpm gen"

[tasks.dev]
description = "dev"
run = """
  pnpm dev
"""

[tasks.deploy]
description = "Build and deploy frontend to Cloudflare Workers"
run = """
  pnpm build
  wrangler deploy
"""
